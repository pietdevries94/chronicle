<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <!-- Background circle -->
  <circle cx="32" cy="32" r="30" fill="#E8E2D9"/>

  <!-- Outer ring (time/chronicle motif) -->
  <circle cx="32" cy="32" r="22" stroke="#3E3A36" stroke-width="2"/>

  <!-- Stylized "c" -->
  <path d="M40 22
           A12 12 0 1 0 40 42"
        stroke="#3E3A36"
        stroke-width="3"
        stroke-linecap="round"
        fill="none"/>

  <!-- Small tick mark (like a clock hand) -->
  <line x1="32" y1="32" x2="32" y2="18"
        stroke="#D99A7C"
        stroke-width="2"
        stroke-linecap="round"/>
</svg>
